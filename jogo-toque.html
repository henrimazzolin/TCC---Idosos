<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogo de toque para idosos - Mente Ativa">
    <title>Mente Ativa - Jogo de Toque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/jogo-toque.css">
</head>
<body>
    <div class="header">
        <button class="back-btn" id="btn-back">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </button>
        <div class="logo">
            <div class="logo-icon">
                <img src="img/unnamed.jpg" alt="Logo">
            </div>
            <span class="logo-text">Mente Ativa</span>
        </div>
    </div>

    <div class="main-content">
        <div class="game-card">
            <div class="instruction-box">
                <p class="instruction-text">CLIQUE NO QUADRADO VERDE</p>
            </div>

            <div class="grid-container">
                <div class="grid" id="grid"></div>
            </div>

            <div class="score-display">
                <div class="score-item">
                    <div class="score-label">Acertos</div>
                    <div class="score-value" id="acertos">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Falta</div>
                    <div class="score-value" id="falta">5</div>
                </div>
            </div>

            <button class="restart-btn" id="btn-restart">Jogar Novamente</button>
        </div>
    </div>

    <div class="feedback-overlay" id="feedbackOverlay">
        <div class="feedback-card">
            <div class="feedback-icon" id="feedbackIcon"></div>
            <h2 class="feedback-title" id="feedbackTitle"></h2>
            <p class="feedback-subtitle" id="feedbackSubtitle"></p>
            <button class="feedback-btn" id="feedbackBtn">Continuar</button>
        </div>
    </div>

    <footer>Feito com cuidado para você</footer>

    <script src="js/jogo-toque.js"></script>
</body>
</html>
