<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Jogo de Toque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #06B6D4;
            --cor-secundaria: #10B981;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(6, 182, 212, 0.15);
            --sombra-hover: 0 8px 30px rgba(6, 182, 212, 0.25);
            --borda-radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover { transform: translateX(-4px); }
        .back-btn svg { width: 24px; height: 24px; fill: var(--cor-texto); }

        .logo { display: flex; align-items: center; gap: 10px; }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #7C3AED, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .page-title { text-align: center; margin-bottom: 20px; }
        .page-title h1 { font-size: clamp(24px, 4vw, 32px); font-weight: 700; margin-bottom: 8px; }
        .page-title p { font-size: 18px; color: var(--cor-texto-claro); }

        .instrucao {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .instrucao p { font-size: 20px; font-weight: 600; color: #92400E; }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            background: var(--cor-fundo-card);
            padding: 10px 20px;
            border-radius: 14px;
            box-shadow: var(--sombra);
            text-align: center;
        }

        .info-label { font-size: 14px; color: var(--cor-texto-claro); }
        .info-value { font-size: 24px; font-weight: 700; color: var(--cor-primaria); }

        .game-area {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 40px 30px;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .question {
            font-size: 28px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 30px;
        }

        .target-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            background: var(--cor-primaria);
            color: white;
            font-size: 32px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(6, 182, 212, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .target-btn:hover {
            transform: scale(1.05);
            background: #0891B2;
        }

        .target-btn:active {
            transform: scale(0.95);
        }

        .target-btn svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        .target-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .btn {
            padding: 16px 48px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0891B2;
            transform: scale(1.05);
        }

        .btn.secondary {
            background: var(--cor-secundaria);
        }

        .btn.secondary:hover {
            background: #059669;
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--cor-fundo-card);
            padding: 40px 50px;
            border-radius: var(--borda-radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .feedback.show { transform: translate(-50%, -50%) scale(1); }

        .feedback-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback-icon.success { background: rgba(16, 185, 129, 0.2); }
        .feedback-icon.success svg { fill: #10B981; width: 50px; height: 50px; }

        .feedback h2 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .feedback p { font-size: 18px; color: var(--cor-texto-claro); }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .overlay.show { opacity: 1; visibility: visible; }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .target-btn {
                width: 140px;
                height: 140px;
                font-size: 24px;
            }
            .target-btn svg {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-simples.html" class="back-btn">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Jogo de Toque</h1>
            <p>Toque no botão quando aparecer</p>
        </div>

        <div class="instrucao">
            <p>Como jogar: Clique no botão azul quando ele aparecer!</p>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">Acertos</div>
                <div class="info-value" id="correct">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Tentativas</div>
                <div class="info-value" id="attempts">0/5</div>
            </div>
        </div>

        <div class="game-area">
            <p class="question" id="question">Clique em Começar!</p>
            
            <button class="btn secondary" id="startBtn" onclick="startGame()">Começar</button>
            
            <button class="target-btn hidden" id="targetBtn" onclick="hitButton()">
                <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.21 0-.59-.34-1.11-.84-1.35z"/></svg>
                TOQUE
            </button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="feedback" id="feedback">
        <div class="feedback-icon" id="feedbackIcon"></div>
        <h2 id="feedbackTitle">Parabéns!</h2>
        <p id="feedbackText">Você completou o jogo!</p>
        <button class="btn" id="feedbackBtn" onclick="handleFeedback()">Jogar Novamente</button>
    </div>

    <footer><p>Feito com cuidado para você</p></footer>

    <script>
        let correctCount = 0;
        let attempts = 0;
        let maxAttempts = 5;
        let gameStarted = false;
        let timeoutId = null;

        function initGame() {
            correctCount = 0;
            attempts = 0;
            gameStarted = false;
            
            document.getElementById('correct').textContent = '0';
            document.getElementById('attempts').textContent = '0/' + maxAttempts;
            
            document.getElementById('question').textContent = 'Clique em Começar!';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('targetBtn').classList.add('hidden');
        }

        function startGame() {
            gameStarted = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('question').textContent = 'Aguarde...';
            
            showTarget();
        }

        function showTarget() {
            if (attempts >= maxAttempts) {
                showResult();
                return;
            }
            
            const delay = 1000 + Math.random() * 2000;
            
            timeoutId = setTimeout(() => {
                const targetBtn = document.getElementById('targetBtn');
                targetBtn.classList.remove('hidden');
                document.getElementById('question').textContent = 'TOQUE AGORA!';
                
                timeoutId = setTimeout(() => {
                    if (!targetBtn.classList.contains('hidden')) {
                        targetBtn.classList.add('hidden');
                        document.getElementById('question').textContent = 'Muito lento! Tente na próxima.';
                        attempts++;
                        document.getElementById('attempts').textContent = attempts + '/' + maxAttempts;
                        
                        setTimeout(showTarget, 1500);
                    }
                }, 2000);
            }, delay);
        }

        function hitButton() {
            clearTimeout(timeoutId);
            
            const targetBtn = document.getElementById('targetBtn');
            targetBtn.classList.add('hidden');
            
            correctCount++;
            attempts++;
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('attempts').textContent = attempts + '/' + maxAttempts;
            
            showFeedback(true);
            
            setTimeout(showTarget, 1200);
        }

        function showFeedback(success) {
            const overlay = document.getElementById('overlay');
            const feedback = document.getElementById('feedback');
            const feedbackIcon = document.getElementById('feedbackIcon');
            
            feedbackIcon.className = 'feedback-icon success';
            feedbackIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
            
            overlay.classList.add('show');
            
            setTimeout(() => {
                overlay.classList.remove('show');
            }, 800);
        }

        function showResult() {
            const overlay = document.getElementById('overlay');
            const feedback = document.getElementById('feedback');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');
            
            feedbackTitle.textContent = 'Parabéns!';
            feedbackText.textContent = `Você tocou ${correctCount} de ${maxAttempts} vezes!`;
            
            overlay.classList.add('show');
            feedback.classList.add('show');
            
            document.getElementById('question').textContent = 'Jogo terminado!';
        }

        function handleFeedback() {
            const overlay = document.getElementById('overlay');
            const feedback = document.getElementById('feedback');
            overlay.classList.remove('show');
            feedback.classList.remove('show');
            initGame();
        }

        document.getElementById('overlay').addEventListener('click', handleFeedback);

        initGame();
    </script>
</body>
</html>
