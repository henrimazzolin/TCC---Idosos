<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Quebra-cabeça</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --sombra-hover: 0 8px 30px rgba(37, 99, 235, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .page-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .page-title h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 8px;
        }

        .page-title p {
            font-size: 16px;
            color: var(--cor-texto-claro);
        }

        .game-container {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 25px;
        }

        .instructions {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .instructions p {
            font-size: 16px;
            font-weight: 600;
            color: #92400E;
        }

        .puzzle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .puzzle-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: var(--cor-texto);
            padding: 6px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .puzzle-piece {
            background-size: 300% 300%;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            border: 3px solid transparent;
        }

        .puzzle-piece:hover {
            transform: scale(1.02);
        }

        .puzzle-piece.selected {
            border-color: var(--cor-terceira);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
            transform: scale(1.05);
        }

        .preview-container {
            text-align: center;
        }

        .preview-label {
            font-size: 14px;
            color: var(--cor-texto-claro);
            margin-bottom: 8px;
        }

        .preview-image {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            border: 3px solid var(--cor-primaria);
            object-fit: cover;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 28px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1D4ED8;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: var(--cor-terceira);
        }

        .btn-secondary:hover {
            background: #D97706;
        }

        .message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--cor-fundo-card);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .message.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
        }

        .message h2 {
            font-size: 36px;
            color: var(--cor-secundaria);
            margin-bottom: 16px;
        }

        .message p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            margin-bottom: 24px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .puzzle-container {
                max-width: 300px;
            }
            
            .preview-image {
                width: 100px;
                height: 100px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <span class="logo-text">MindCare</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Quebra-cabeça</h1>
            <p>Monte a imagem corretamente</p>
        </div>

        <div class="game-container">
            <div class="instructions">
                <p>Como jogar: Clique em uma peça, depois clique em outra para trocá-las de lugar!</p>
            </div>

            <div class="puzzle-wrapper">
                <div class="puzzle-container" id="puzzleContainer"></div>

                <div class="preview-container">
                    <p class="preview-label">Imagem original:</p>
                    <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=300&h=300&fit=crop" alt="Cachorro" class="preview-image">
                </div>
            </div>

            <div class="buttons">
                <button class="btn" onclick="initGame()">Reiniciar Jogo</button>
                <button class="btn btn-secondary" onclick="window.location.href='grupo-moderado.html'">Voltar</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeMessage()"></div>
    <div class="message" id="message">
        <h2>Parabéns!</h2>
        <p>Você completou o quebra-cabeça!</p>
        <button class="btn" onclick="initGame()">Jogar Novamente</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        const imageUrl = 'https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=300&h=300&fit=crop';
        const gridSize = 3;
        const totalPieces = gridSize * gridSize;
        
        let pieces = [];
        let selectedPiece = null;
        let isProcessing = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initGame() {
            closeMessage();
            selectedPiece = null;
            isProcessing = false;

            pieces = [];
            for (let i = 0; i < totalPieces; i++) {
                pieces.push(i);
            }

            do {
                pieces = shuffleArray(pieces);
            } while (isSolved());

            renderPuzzle();
        }

        function isSolved() {
            for (let i = 0; i < totalPieces; i++) {
                if (pieces[i] !== i) return false;
            }
            return true;
        }

        function renderPuzzle() {
            const container = document.getElementById('puzzleContainer');
            container.innerHTML = '';

            pieces.forEach((pieceIndex, positionIndex) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.dataset.position = positionIndex;
                piece.dataset.piece = pieceIndex;

                const row = Math.floor(pieceIndex / gridSize);
                const col = pieceIndex % gridSize;
                piece.style.backgroundImage = `url(${imageUrl})`;
                piece.style.backgroundPosition = `${col * 50}% ${row * 50}%`;

                piece.addEventListener('click', () => handlePieceClick(positionIndex));

                container.appendChild(piece);
            });
        }

        function handlePieceClick(positionIndex) {
            if (isProcessing) return;

            const clickedPiece = document.querySelector(`.puzzle-piece[data-position="${positionIndex}"]`);

            if (selectedPiece === null) {
                selectedPiece = positionIndex;
                clickedPiece.classList.add('selected');
            } else if (selectedPiece === positionIndex) {
                clickedPiece.classList.remove('selected');
                selectedPiece = null;
            } else {
                isProcessing = true;
                
                const firstPiece = document.querySelector(`.puzzle-piece[data-position="${selectedPiece}"]`);
                firstPiece.classList.remove('selected');

                swapPieces(selectedPiece, positionIndex);

                setTimeout(() => {
                    selectedPiece = null;
                    isProcessing = false;

                    if (isSolved()) {
                        showWinMessage();
                    }
                }, 300);
            }
        }

        function swapPieces(pos1, pos2) {
            const temp = pieces[pos1];
            pieces[pos1] = pieces[pos2];
            pieces[pos2] = temp;

            renderPuzzle();
        }

        function showWinMessage() {
            document.getElementById('overlay').classList.add('show');
            document.getElementById('message').classList.add('show');
        }

        function closeMessage() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('message').classList.remove('show');
        }

        document.getElementById('overlay').addEventListener('click', closeMessage);

        initGame();
    </script>
</body>
</html>
