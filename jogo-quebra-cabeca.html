<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogo de quebra-cabeça para idosos - Mente Ativa">
    <title>Mente Ativa - Quebra-cabeça</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/jogo-quebra-cabeca.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Quebra-cabeça</h1>
            <p>Monte a imagem corretamente</p>
        </div>

        <div class="game-container">
            <div class="instructions">
                <p>Como jogar: Clique em uma peça, depois clique em outra para trocá-las de lugar!</p>
            </div>

            <div class="puzzle-wrapper">
                <div class="puzzle-container" id="puzzleContainer"></div>

                <div class="preview-container">
                    <p class="preview-label">Imagem original:</p>
                    <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=300&h=300&fit=crop" alt="Cachorro" class="preview-image">
                </div>
            </div>

            <div class="buttons">
                <button class="btn" id="btn-restart">Reiniciar Jogo</button>
                <button class="btn btn-secondary" id="btn-back">Voltar</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="message" id="message">
        <h2>Parabéns!</h2>
        <p>Você completou o quebra-cabeça!</p>
        <button class="btn" id="btn-play-again">Jogar Novamente</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script src="js/jogo-quebra-cabeca.js"></script>
</body>
</html>
