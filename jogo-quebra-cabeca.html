<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Quebra-cabeça</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --sombra-hover: 0 8px 30px rgba(37, 99, 235, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--sombra);
            text-decoration: none;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-area {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 40px;
            text-align: center;
        }

        .game-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-description {
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
            background: var(--cor-primaria);
            color: white;
        }

        .btn-secondary {
            background: #D97706;
        }

        /* ===== PUZZLE ===== */

        .puzzle-board {
            display: grid;
            gap: 6px;
            justify-content: center;
            margin-top: 20px;
        }

        .puzzle-tile {
            border-radius: 10px;
            cursor: pointer;
            background-size: 100% 100%;
            transition: 0.2s;
        }

        .puzzle-tile:hover {
            transform: scale(1.05);
        }

        .empty {
            background: transparent !important;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">←</a>
            <div class="logo-text">MindCare</div>
        </div>

        <div class="page-title">
            <h1>Quebra-cabeça</h1>
            <p>Monte a imagem correta</p>
        </div>

        <div class="game-area">

            <!-- MENU -->
            <div id="menu">
                <div class="game-icon">🧩</div>

                <p class="game-description">
                    Monte as peças do quebra-cabeça na ordem correta para revelar a imagem completa.
                </p>

                <button class="btn" onclick="iniciarJogo()">Começar Jogo</button>
                <button class="btn btn-secondary" onclick="window.location.href='grupo-moderado.html'">Voltar</button>
            </div>

            <!-- JOGO -->
            <div id="jogo" style="display:none;">

                <div style="margin-bottom:20px;">
                    <select id="dificuldade">
                        <option value="3">3x3</option>
                        <option value="4" selected>4x4</option>
                        <option value="5">5x5</option>
                    </select>
                    <button class="btn" onclick="novoJogo()">Novo Jogo</button>
                </div>

                <div id="puzzle-board" class="puzzle-board"></div>

                <button class="btn btn-secondary" onclick="voltarMenu()">Voltar</button>
            </div>

        </div>

    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        let board = [];
        let size = 4;
        let imagemURL = "https://picsum.photos/400";

        function iniciarJogo() {
            document.getElementById("menu").style.display = "none";
            document.getElementById("jogo").style.display = "block";
            novoJogo();
        }

        function voltarMenu() {
            document.getElementById("menu").style.display = "block";
            document.getElementById("jogo").style.display = "none";
        }

        function novoJogo() {
            size = parseInt(document.getElementById("dificuldade").value);

            board = [...Array(size * size - 1).keys()].map(n => n + 1);
            board.push(null);

            embaralhar(board);
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById("puzzle-board");
            container.innerHTML = "";
            container.style.gridTemplateColumns = `repeat(${size}, 80px)`;

            board.forEach((num, index) => {
                const tile = document.createElement("div");
                tile.classList.add("puzzle-tile");

                tile.style.width = "80px";
                tile.style.height = "80px";

                if (num === null) {
                    tile.classList.add("empty");
                } else {
                    const row = Math.floor((num - 1) / size);
                    const col = (num - 1) % size;

                    tile.style.backgroundImage = `url(${imagemURL})`;
                    tile.style.backgroundSize = `${size * 100}%`;
                    tile.style.backgroundPosition =
                        `${(col / (size - 1)) * 100}% ${(row / (size - 1)) * 100}%`;

                    tile.onclick = () => mover(index);
                }

                container.appendChild(tile);
            });
        }

        function mover(index) {
            const emptyIndex = board.indexOf(null);

            const linha = Math.floor(index / size);
            const coluna = index % size;

            const linhaVazia = Math.floor(emptyIndex / size);
            const colunaVazia = emptyIndex % size;

            const podeMover =
                (linha === linhaVazia && Math.abs(coluna - colunaVazia) === 1) ||
                (coluna === colunaVazia && Math.abs(linha - linhaVazia) === 1);

            if (podeMover) {
                [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
                renderizar();
                verificarVitoria();
            }
        }

        function verificarVitoria() {
            for (let i = 0; i < board.length - 1; i++) {
                if (board[i] !== i + 1) return;
            }

            setTimeout(() => {
                alert("🎉 Você venceu!");
            }, 200);
        }

        function embaralhar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        document.getElementById("uploadImagem").addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (!file) return;

            imagemURL = URL.createObjectURL(file);
            novoJogo();
        });
    </script>

</body>
</html>
```
