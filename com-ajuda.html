<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Usar com Ajuda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --cor-botao-solitario: #10B981;
            --cor-botao-ajuda: #F59E0B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --sombra-hover: 0 8px 30px rgba(37, 99, 235, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 50px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
            box-shadow: var(--sombra-hover);
        }

        .back-btn:focus {
            outline: 4px solid var(--cor-botao-ajuda);
            outline-offset: 2px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #7C3AED, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title h1 {
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 12px;
        }

        .page-title p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .info-box p {
            color: #B45309;
            font-size: 16px;
            font-weight: 600;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
        }

        .game-card {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            padding: 40px 28px;
            box-shadow: var(--sombra);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 3px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--sombra-hover);
            border-color: var(--cor-botao-ajuda);
        }

        .game-card:focus {
            outline: 4px solid var(--cor-botao-ajuda);
            outline-offset: 4px;
        }

        .game-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.25), rgba(245, 158, 11, 0.1));
        }

        .game-icon svg {
            width: 44px;
            height: 44px;
            fill: #D97706;
        }

        .game-card.azul .game-icon {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.25), rgba(37, 99, 235, 0.1));
        }

        .game-card.azul .game-icon svg {
            fill: #2563EB;
        }

        .game-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 17px;
            font-weight: 500;
            color: var(--cor-texto-claro);
            line-height: 1.5;
        }

        .jogar-btn {
            margin-top: 20px;
            padding: 14px 36px;
            background: #F59E0B;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-card:hover .jogar-btn {
            background: #D97706;
        }

        .game-card.azul .jogar-btn {
            background: #2563EB;
        }

        .game-card.azul:hover .jogar-btn {
            background: #1D4ED8;
        }

        .info-box {
            background: rgba(245, 158, 11, 0.15);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 40px;
            text-align: center;
        }

        .info-box p {
            color: #B45309;
            font-size: 16px;
            font-weight: 500;
        }

        .game-card.azul:hover .jogar-btn {
            background: #234863;
        }

        .info-box {
            background: rgba(123, 107, 74, 0.1);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 40px;
            text-align: center;
        }

        .info-box p {
            color: var(--cor-botao-ajuda);
            font-size: 16px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .logo {
                width: 100%;
                justify-content: center;
                margin-top: 12px;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
            
            .game-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="info-box">
            <p>Um acompanhante pode ajudar a ler as instruções e clicar</p>
        </div>

        <div class="page-title">
            <h1>Escolha um jogo</h1>
            <p>Modo com ajuda</p>
        </div>

        <div class="games-grid">
            <div class="game-card">
                <div class="game-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/>
                    </svg>
                </div>
                <h2 class="game-title">Jogo da Memória</h2>
                <p class="game-desc">Encontre os pares de cartas</p>
                <button class="jogar-btn">Jogar</button>
            </div>

            <div class="game-card azul">
                <div class="game-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                </div>
                <h2 class="game-title">Sequências</h2>
                <p class="game-desc">Complete a sequência</p>
                <button class="jogar-btn">Jogar</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>
</body>
</html>
