<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Reconhecimento de Imagens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/acessibilidade.js" defer></script>
    <style>
        :root {
            --cor-primaria: #10B981;
            --cor-secundaria: #2563EB;
            --cor-terceira: #F59E0B;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(16, 185, 129, 0.15);
            --sombra-hover: 0 8px 30px rgba(16, 185, 129, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
            box-shadow: var(--sombra-hover);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 8px;
            display: inline;
        }

        .titulo-com-tts {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .page-title p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .tts-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--cor-primaria);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .tts-btn:hover {
            background: #059669;
            transform: scale(1.1);
        }

        .tts-btn svg {
            width: 28px;
            height: 28px;
        }

        .tts-btn.lendo {
            background: #2563EB;
            animation: pulsando 1.5s ease-in-out infinite;
        }

        @keyframes pulsando {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .instrucao-destaque {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 24px;
            text-align: center;
        }

        .instrucao-destaque p {
            font-size: 20px;
            font-weight: 600;
            color: #92400E;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .info-item {
            background: var(--cor-fundo-card);
            padding: 12px 24px;
            border-radius: 14px;
            box-shadow: var(--sombra);
            text-align: center;
        }

        .info-label {
            font-size: 14px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .image-display {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .image-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            background: var(--cor-fundo);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container svg {
            width: 80px;
            height: 80px;
            fill: var(--cor-primaria);
        }

        .question {
            font-size: 22px;
            font-weight: 700;
            color: var(--cor-texto);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: var(--cor-fundo-card);
            border: 3px solid var(--cor-primaria);
            border-radius: var(--borda-radius);
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            color: var(--cor-texto);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--sombra);
        }

        .option-btn:hover:not(:disabled) {
            background: var(--cor-primaria);
            color: white;
            transform: scale(1.02);
        }

        .option-btn.correct {
            background: var(--cor-primaria);
            border-color: var(--cor-primaria);
            color: white;
        }

        .option-btn.wrong {
            background: #EF4444;
            border-color: #EF4444;
            color: white;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .btn {
            padding: 14px 36px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .btn:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--cor-fundo-card);
            padding: 40px 60px;
            border-radius: var(--borda-radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .feedback.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .feedback-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback-icon.success {
            background: rgba(16, 185, 129, 0.2);
        }

        .feedback-icon.success svg {
            fill: #10B981;
            width: 50px;
            height: 50px;
        }

        .feedback-icon.error {
            background: rgba(239, 68, 68, 0.2);
        }

        .feedback-icon.error svg {
            fill: #EF4444;
            width: 50px;
            height: 50px;
        }

        .feedback h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 10px;
        }

        .feedback p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .logo {
                width: 100%;
                justify-content: center;
                margin-top: 12px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .image-container {
                width: 120px;
                height: 120px;
            }

            .image-container svg {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-simples.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <div class="titulo-com-tts">
                <h1>Reconhecimento de Imagens</h1>
                <button class="tts-btn" onclick="toggleLeitura('Reconhecimento de Imagens. Identifique o que está na figura. Clique na resposta correta.', this)" aria-label="Ouvir instruções">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
            </div>
            <p>Identifique o que está na figura</p>
        </div>

        <div class="instrucao-destaque">
            <p>Como jogar: Olhe a figura e clique no nome dela!</p>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">Acertos</div>
                <div class="info-value" id="correct">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Questão</div>
                <div class="info-value" id="question">1/5</div>
            </div>
        </div>

        <div class="image-display">
            <div class="image-container" id="imageContainer"></div>
            <p class="question">O que é isto?</p>
        </div>

        <div class="options-grid" id="optionsGrid"></div>

        <button class="btn" id="nextBtn" style="display: none;" onclick="nextQuestion()">Próxima Figura</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="feedback" id="feedback">
        <div class="feedback-icon" id="feedbackIcon"></div>
        <h2 id="feedbackTitle">Muito bem!</h2>
        <p id="feedbackText">Você acertou!</p>
        <button class="btn" id="feedbackBtn" onclick="handleFeedback()">Continuar</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        const images = [
            {
                icon: '<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>',
                correct: 'Música',
                options: ['Música', 'Dança', 'Canto', 'Som']
            },
            {
                icon: '<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>',
                correct: 'Foto',
                options: ['Foto', 'Quadro', 'Pintura', 'Imagem']
            },
            {
                icon: '<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>',
                correct: 'Globo',
                options: ['Globo', 'Mapa', 'Planeta', 'Terra']
            },
            {
                icon: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
                correct: 'Mundo',
                options: ['Mundo', 'Globo', 'Terra', 'Planeta']
            },
            {
                icon: '<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>',
                correct: 'Casa',
                options: ['Casa', 'Porta', 'Janela', 'Telhado']
            }
        ];

        let currentImages = [];
        let currentIndex = 0;
        let correctCount = 0;
        let isComplete = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initGame() {
            currentImages = shuffleArray(images);
            currentIndex = 0;
            correctCount = 0;
            isComplete = false;
            
            document.getElementById('correct').textContent = '0';
            document.getElementById('question').textContent = '1/5';
            
            loadQuestion();
        }

        function loadQuestion() {
            const img = currentImages[currentIndex];
            
            document.getElementById('imageContainer').innerHTML = img.icon;
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            const shuffledOptions = shuffleArray(img.options);
            
            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsGrid.appendChild(btn);
            });
            
            document.getElementById('nextBtn').style.display = 'none';
        }

        function checkAnswer(answer, btn) {
            const correct = currentImages[currentIndex].correct;
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach(b => b.disabled = true);
            
            if (answer === correct) {
                btn.classList.add('correct');
                correctCount++;
                document.getElementById('correct').textContent = correctCount;
                
                showFeedback(true, 'Muito bem!', 'Você acertou!');
            } else {
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if (b.textContent === correct) {
                        b.classList.add('correct');
                    }
                });
                
                showFeedback(false, 'Quase lá!', 'A resposta correta era ' + correct);
            }
            
            document.getElementById('nextBtn').style.display = 'block';
            
            if (currentIndex === currentImages.length - 1) {
                isComplete = true;
                document.getElementById('nextBtn').textContent = 'Ver Resultado';
                document.getElementById('nextBtn').onclick = showResult;
            }
        }

        function nextQuestion() {
            if (isComplete) {
                showResult();
                return;
            }
            
            currentIndex++;
            document.getElementById('question').textContent = `${currentIndex + 1}/5`;
            loadQuestion();
        }

        function showResult() {
            const overlay = document.getElementById('overlay');
            const feedback = document.getElementById('feedback');
            const feedbackIcon = document.getElementById('feedbackIcon');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');
            const feedbackBtn = document.getElementById('feedbackBtn');
            
            feedbackIcon.className = 'feedback-icon success';
            feedbackIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
            
            feedbackTitle.textContent = 'Parabéns!';
            feedbackText.textContent = `Você acertou ${correctCount} de ${currentImages.length} perguntas!`;
            
            feedbackBtn.textContent = 'Jogar Novamente';
            feedbackBtn.onclick = () => {
                overlay.classList.remove('show');
                feedback.classList.remove('show');
                document.getElementById('nextBtn').textContent = 'Próxima Figura';
                document.getElementById('nextBtn').onclick = nextQuestion;
                initGame();
            };
            
            overlay.classList.add('show');
            feedback.classList.add('show');
        }

        function handleFeedback() {
            const overlay = document.getElementById('overlay');
            const feedback = document.getElementById('feedback');
            overlay.classList.remove('show');
            feedback.classList.remove('show');
        }

        document.getElementById('overlay').addEventListener('click', handleFeedback);

        initGame();
    </script>
</body>
</html>
