<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Palavras Cruzadas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light theme (default) */
            --cor-fundo: #F8FAFC;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #1E293B;
            --cor-texto-claro: #64748B;
            --cor-primaria: #3B82F6;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-sucesso: #10B981;
            --cor-erro: #EF4444;
            --sombra: 0 4px 20px rgba(0, 0, 0, 0.08);
            --sombra-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --borda-radius: 16px;
            --border: #E2E8F0;
            --primary-light: rgba(59, 130, 246, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #0B6477, #0AD1C8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title {
            text-align: center;
            margin-bottom: 24px;
        }

        .page-title h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 8px;
        }

        .game-level {
            display: inline-block;
            background: var(--cor-terceira);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .game-container {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 30px;
        }

        .game-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
        }

        .grid-section {
            flex: 0 0 auto;
        }

        .crossword-grid {
            display: grid;
            gap: 3px;
            background: var(--cor-bloqueada);
            padding: 3px;
            border-radius: 8px;
            border: 3px solid var(--cor-bloqueada);
        }

        .cell {
            width: 50px;
            height: 50px;
            position: relative;
            background: white;
        }

        .cell.blocked {
            background: var(--cor-bloqueada-escura);
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            color: var(--cor-texto);
            background: transparent;
            outline: none;
            cursor: pointer;
            padding: 0;
        }

        .cell input:focus {
            background: var(--cor-destaque);
        }

        .cell input.correct {
            background: var(--cor-correto);
            color: #065F46;
        }

        .cell input.active-row {
            background: #FEF3C7;
        }

        .cell input.active-col {
            background: #FEF3C7;
        }

        .cell .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--cor-primaria);
            line-height: 1;
        }

        .hints-section {
            flex: 1;
            min-width: 280px;
            max-width: 350px;
        }

        .hints-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 16px;
            text-align: center;
        }

        .hints-group {
            margin-bottom: 24px;
        }

        .hints-group h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--cor-primaria);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--cor-destaque);
        }

        .hint-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--cor-fundo);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hint-item:hover {
            background: var(--cor-destaque);
        }

        .hint-item.active {
            background: var(--cor-destaque);
            border: 2px solid var(--cor-primaria);
        }

        .hint-item.correct {
            background: var(--cor-correto);
        }

        .hint-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria);
            min-width: 28px;
        }

        .hint-text {
            font-size: 16px;
            color: var(--cor-texto-claro);
            line-height: 1.4;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 36px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1D4ED8;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: var(--cor-terceira);
        }

        .btn-secondary:hover {
            background: #D97706;
        }

        .message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--cor-fundo-card);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
        }

        .message.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .message h2 {
            font-size: 36px;
            color: var(--cor-secundaria);
            margin-bottom: 16px;
        }

        .message p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            margin-bottom: 24px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .game-content {
                flex-direction: column;
                align-items: center;
            }

            .cell {
                width: 42px;
                height: 42px;
            }

            .cell input {
                font-size: 22px;
            }

            .hints-section {
                width: 100%;
                max-width: none;
            }

            .page-title h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Palavras Cruzadas</h1>
            <div class="game-level" id="gameLevel">Tema: Natureza</div>
        </div>

        <div class="game-container">
            <div class="game-content">
                <div class="grid-section">
                    <div class="crossword-grid" id="grid"></div>
                </div>

                <div class="hints-section">
                    <div class="hints-group">
                        <h3>Horizontais</h3>
                        <div id="hints-h"></div>
                    </div>
                    <div class="hints-group">
                        <h3>Verticais</h3>
                        <div id="hints-v"></div>
                    </div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn" onclick="resetGame()">Reiniciar Jogo</button>
                <button class="btn btn-secondary" onclick="window.location.href='grupo-moderado.html'">Voltar</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeMessage()"></div>
    <div class="message" id="message">
        <h2>Parabéns!</h2>
        <p>Você completou todas as palavras!</p>
        <button class="btn" onclick="resetGame()">Jogar Novamente</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        const games = [
            {
                id: 1,
                name: "Tema: Casa",
                size: 7,
                layout: [
                    ['C', 'A', 'S', 'A', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', '#', 'S', 'O', 'L', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', '#', 'T', 'E', 'L', 'A', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#']
                ],
                words: [
                    { number: 1, word: 'CASA', direction: 'h', row: 0, col: 0, hint: 'Local onde moramos' },
                    { number: 2, word: 'SOL', direction: 'h', row: 2, col: 2, hint: 'Estrela que ilumina o dia' },
                    { number: 3, word: 'TELA', direction: 'h', row: 4, col: 2, hint: 'Para ver imagens' }
                ]
            },
            {
                id: 2,
                name: "Tema: Natureza",
                size: 7,
                layout: [
                    ['S', 'O', 'L', '#', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', 'F', 'L', 'O', 'R', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', 'R', 'O', 'S', 'A', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#']
                ],
                words: [
                    { number: 1, word: 'SOL', direction: 'h', row: 0, col: 0, hint: 'Estrela que ilumina o dia' },
                    { number: 2, word: 'FLOR', direction: 'h', row: 3, col: 1, hint: 'Planta bonita' },
                    { number: 3, word: 'ROSA', direction: 'h', row: 5, col: 1, hint: 'Flor com espinhos' }
                ]
            },
            {
                id: 3,
                name: "Tema: Corpo",
                size: 7,
                layout: [
                    ['O', 'L', 'H', 'O', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', 'B', 'O', 'C', 'A', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', 'M', 'A', 'O', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#'],
                    ['#', '#', '#', '#', '#', '#', '#']
                ],
                words: [
                    { number: 1, word: 'OLHO', direction: 'h', row: 0, col: 0, hint: 'Usamos para ver' },
                    { number: 2, word: 'BOCA', direction: 'h', row: 2, col: 1, hint: 'Para comer e falar' },
                    { number: 3, word: 'MAO', direction: 'h', row: 4, col: 1, hint: 'Tem cinco dedos' }
                ]
            }
        ];

        let currentGame = null;
        let currentWord = null;
        let currentHint = null;
        let lastGameId = -1;

        function selectRandomGame() {
            let availableGames = games.filter(g => g.id !== lastGameId);
            if (availableGames.length === 0) {
                availableGames = games;
            }
            const randomIndex = Math.floor(Math.random() * availableGames.length);
            currentGame = availableGames[randomIndex];
            lastGameId = currentGame.id;
            
            document.getElementById('gameLevel').textContent = currentGame.name;
        }

        function initGame() {
            selectRandomGame();
            
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${currentGame.size}, 1fr)`;

            for (let row = 0; row < currentGame.size; row++) {
                for (let col = 0; col < currentGame.size; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    if (currentGame.layout[row][col] === '#') {
                        cell.classList.add('blocked');
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.dataset.row = row;
                        input.dataset.col = col;
                        input.addEventListener('input', handleInput);
                        input.addEventListener('keydown', handleKeydown);
                        input.addEventListener('focus', handleFocus);
                        input.addEventListener('blur', handleBlur);
                        cell.appendChild(input);

                        const wordNum = getWordNumberAt(row, col);
                        if (wordNum) {
                            const numEl = document.createElement('span');
                            numEl.className = 'cell-number';
                            numEl.textContent = wordNum;
                            cell.appendChild(numEl);
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }

            renderHints();
        }

        function getWordNumberAt(row, col) {
            for (const word of currentGame.words) {
                if (word.direction === 'h') {
                    if (row === word.row && col === word.col) return word.number;
                } else {
                    if (row === word.row && col === word.col) return word.number;
                }
            }
            return null;
        }

        function getWordAt(row, col) {
            for (const word of currentGame.words) {
                if (word.direction === 'h') {
                    if (row === word.row && col >= word.col && col < word.col + word.word.length) {
                        return word;
                    }
                } else {
                    if (col === word.col && row >= word.row && row < word.row + word.word.length) {
                        return word;
                    }
                }
            }
            return null;
        }

        function renderHints() {
            const hintsH = document.getElementById('hints-h');
            const hintsV = document.getElementById('hints-v');
            hintsH.innerHTML = '';
            hintsV.innerHTML = '';

            currentGame.words.filter(w => w.direction === 'h').forEach(word => {
                const hintEl = createHintElement(word);
                hintsH.appendChild(hintEl);
            });

            currentGame.words.filter(w => w.direction === 'v').forEach(word => {
                const hintEl = createHintElement(word);
                hintsV.appendChild(hintEl);
            });
        }

        function createHintElement(word) {
            const div = document.createElement('div');
            div.className = 'hint-item';
            div.dataset.word = word.number;
            div.addEventListener('click', () => selectWord(word));
            div.innerHTML = `
                <span class="hint-number">${word.number}.</span>
                <span class="hint-text">${word.hint}</span>
            `;
            return div;
        }

        function selectWord(word) {
            currentWord = word;
            document.querySelectorAll('.hint-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.hint-item[data-word="${word.number}"]`).classList.add('active');

            const firstCell = document.querySelector(`input[data-row="${word.row}"][data-col="${word.col}"]`);
            if (firstCell) {
                firstCell.focus();
            }
        }

        function handleFocus(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            const word = getWordAt(row, col);
            
            if (word) {
                currentWord = word;
                currentHint = word.number;
                
                document.querySelectorAll('.hint-item').forEach(el => el.classList.remove('active'));
                const hintEl = document.querySelector(`.hint-item[data-word="${word.number}"]`);
                if (hintEl) {
                    hintEl.classList.add('active');
                }

                highlightWordCells(word);
            }
        }

        function handleBlur() {
            document.querySelectorAll('.cell input').forEach(input => {
                input.classList.remove('active-row');
                input.classList.remove('active-col');
            });
        }

        function highlightWordCells(word) {
            document.querySelectorAll('.cell input').forEach(input => {
                input.classList.remove('active-row');
                input.classList.remove('active-col');
            });

            for (let i = 0; i < word.word.length; i++) {
                if (word.direction === 'h') {
                    const input = document.querySelector(`input[data-row="${word.row}"][data-col="${word.col + i}"]`);
                    if (input) input.classList.add('active-row');
                } else {
                    const input = document.querySelector(`input[data-row="${word.row + i}"][data-col="${word.col}"]`);
                    if (input) input.classList.add('active-col');
                }
            }
        }

        function handleInput(e) {
            const value = e.target.value.toUpperCase();
            e.target.value = value;

            if (value) {
                const row = parseInt(e.target.dataset.row);
                const col = parseInt(e.target.dataset.col);
                moveToNextCell(row, col);
                checkWord();
            }
        }

        function handleKeydown(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);

            if (e.key === 'Backspace') {
                if (!e.target.value) {
                    moveToPrevCell(row, col);
                }
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                moveCell(row, col + 1);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                moveCell(row, col - 1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                moveCell(row + 1, col);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                moveCell(row - 1, col);
            }
        }

        function moveToNextCell(row, col) {
            const word = getWordAt(row, col);
            if (!word) return;

            if (word.direction === 'h') {
                if (col < word.col + word.word.length - 1) {
                    moveCell(row, col + 1);
                }
            } else {
                if (row < word.row + word.word.length - 1) {
                    moveCell(row + 1, col);
                }
            }
        }

        function moveToPrevCell(row, col) {
            const word = getWordAt(row, col);
            if (!word) return;

            if (word.direction === 'h') {
                if (col > word.col) {
                    moveCell(row, col - 1);
                }
            } else {
                if (row > word.row) {
                    moveCell(row - 1, col);
                }
            }
        }

        function moveCell(row, col) {
            if (row >= 0 && row < currentGame.size && col >= 0 && col < currentGame.size) {
                const input = document.querySelector(`input[data-row="${row}"][data-col="${col}"]`);
                if (input && currentGame.layout[row][col] !== '#') {
                    input.focus();
                }
            }
        }

        function checkWord() {
            if (!currentWord) return;

            let isCorrect = true;
            const inputs = [];

            for (let i = 0; i < currentWord.word.length; i++) {
                let input;
                if (currentWord.direction === 'h') {
                    input = document.querySelector(`input[data-row="${currentWord.row}"][data-col="${currentWord.col + i}"]`);
                } else {
                    input = document.querySelector(`input[data-row="${currentWord.row + i}"][data-col="${currentWord.col}"]`);
                }
                if (input) {
                    inputs.push(input);
                    if (input.value.toUpperCase() !== currentWord.word[i]) {
                        isCorrect = false;
                    }
                }
            }

            if (isCorrect && inputs.every(input => input.value !== '')) {
                inputs.forEach(input => input.classList.add('correct'));
                const hintEl = document.querySelector(`.hint-item[data-word="${currentWord.number}"]`);
                if (hintEl) hintEl.classList.add('correct');
                checkAllWords();
            } else {
                inputs.forEach(input => input.classList.remove('correct'));
            }
        }

        function checkAllWords() {
            let allCorrect = true;

            for (const word of currentGame.words) {
                let correct = true;
                for (let i = 0; i < word.word.length; i++) {
                    let input;
                    if (word.direction === 'h') {
                        input = document.querySelector(`input[data-row="${word.row}"][data-col="${word.col + i}"]`);
                    } else {
                        input = document.querySelector(`input[data-row="${word.row + i}"][data-col="${word.col}"]`);
                    }
                    if (!input || input.value.toUpperCase() !== word.word[i]) {
                        correct = false;
                        break;
                    }
                }
                if (!correct) {
                    allCorrect = false;
                    break;
                }
            }

            if (allCorrect) {
                setTimeout(() => {
                    document.getElementById('overlay').classList.add('show');
                    document.getElementById('message').classList.add('show');
                }, 500);
            }
        }

        function resetGame() {
            closeMessage();
            document.querySelectorAll('.cell input').forEach(input => {
                input.value = '';
                input.classList.remove('correct');
                input.classList.remove('active-row');
                input.classList.remove('active-col');
            });
            document.querySelectorAll('.hint-item').forEach(el => {
                el.classList.remove('correct');
                el.classList.remove('active');
            });
            currentWord = null;
            currentHint = null;
        }

        function closeMessage() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('message').classList.remove('show');
        }

        initGame();
    </script>
</body>
</html>
