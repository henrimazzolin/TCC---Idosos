<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogo de palavras cruzadas para idosos - Mente Ativa">
    <title>Mente Ativa - Palavras Cruzadas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/jogo-palavras-cruzadas.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Palavras Cruzadas</h1>
            <div class="game-level" id="gameLevel">Tema: Natureza</div>
        </div>

        <div class="game-container">
            <div class="game-content">
                <div class="grid-section">
                    <div class="crossword-grid" id="grid"></div>
                </div>

                <div class="hints-section">
                    <div class="hints-group">
                        <h3>Horizontais</h3>
                        <div id="hints-h"></div>
                    </div>
                    <div class="hints-group">
                        <h3>Verticais</h3>
                        <div id="hints-v"></div>
                    </div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn" id="btn-reset">Reiniciar Jogo</button>
                <button class="btn btn-secondary" id="btn-back">Voltar</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="message" id="message">
        <h2>Parabéns!</h2>
        <p>Você completou todas as palavras!</p>
        <button class="btn" id="btn-play-again">Jogar Novamente</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script src="js/jogo-palavras-cruzadas.js"></script>
</body>
</html>
