<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Jogos para Treinar a Mente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/acessibilidade.js" defer></script>
    <style>
        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-quarta: #EF4444;
            --cor-quinta: #8B5CF6;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --sombra-hover: 0 8px 30px rgba(37, 99, 235, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-weight: 500;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .titulo-com-tts {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            color: var(--cor-texto);
            line-height: 1.3;
        }

        .tts-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--cor-primaria);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .tts-btn:hover {
            background: #1D4ED8;
            transform: scale(1.1);
        }

        .tts-btn:focus {
            outline: 4px solid var(--cor-secundaria);
            outline-offset: 2px;
        }

        .tts-btn svg {
            width: 28px;
            height: 28px;
        }

        .tts-btn.lendo {
            background: #10B981;
            animation: pulsando 1.5s ease-in-out infinite;
        }

        @keyframes pulsando {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .subtitle {
            font-size: clamp(18px, 3vw, 24px);
            color: var(--cor-texto-claro);
            font-weight: 500;
            margin-top: 12px;
        }

        .groups-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            max-width: 600px;
        }

        .group-btn {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 28px 32px;
            border: none;
            border-radius: var(--borda-radius);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            background: var(--cor-fundo-card);
            box-shadow: var(--sombra);
            border: 3px solid transparent;
        }

        .group-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--sombra-hover);
        }

        .group-btn:focus {
            outline: 4px solid var(--cor-primaria);
            outline-offset: 4px;
        }

        .group-btn.moderado:hover {
            border-color: var(--cor-primaria);
        }

        .group-btn.simples:hover {
            border-color: var(--cor-secundaria);
        }

        .group-icon {
            width: 72px;
            height: 72px;
            min-width: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .group-icon svg {
            width: 36px;
            height: 36px;
        }

        .moderado .group-icon {
            background: rgba(37, 99, 235, 0.15);
        }

        .moderado .group-icon svg {
            fill: var(--cor-primaria);
        }

        .simples .group-icon {
            background: rgba(16, 185, 129, 0.15);
        }

        .simples .group-icon svg {
            fill: var(--cor-secundaria);
        }

        .group-content {
            text-align: left;
            flex: 1;
        }

        .group-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 4px;
        }

        .group-desc {
            font-size: 16px;
            font-weight: 500;
            color: var(--cor-texto-claro);
        }

        .arrow-icon {
            margin-left: auto;
            width: 28px;
            height: 28px;
            fill: var(--cor-texto-claro);
            transition: transform 0.3s ease;
        }

        .group-btn:hover .arrow-icon {
            transform: translateX(6px);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (min-width: 768px) {
            .groups-container {
                flex-direction: row;
            }
            
            .group-btn {
                flex: 1;
                flex-direction: column;
                text-align: center;
                padding: 40px 24px;
            }
            
            .group-content {
                text-align: center;
            }
            
            .arrow-icon {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <span class="logo-text">MindCare</span>
        </div>

        <header>
            <div class="titulo-com-tts">
                <h1>Jogos para treinar a memória e o raciocínio</h1>
                <button class="tts-btn" onclick="toggleLeitura('Jogos para treinar a memória e o raciocínio. Escolha como você prefere usar o site.', this)" aria-label="Ouvir texto">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
            </div>
            <p class="subtitle">Escolha como você prefere usar o site</p>
        </header>

        <div class="groups-container">
            <a href="menu.html" class="group-btn moderado">
                <div class="group-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="group-content">
                    <h2 class="group-title">Usar sozinho</h2>
                    <p class="group-desc">Quero usar por conta própria</p>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </a>

            <a href="jogos.html" class="group-btn simples">
                <div class="group-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                    </svg>
                </div>
                <div class="group-content">
                    <h2 class="group-title">Usar com ajuda</h2>
                    <p class="group-desc">Quero jogar com acompanhante</p>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </a>
        </div>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>
</body>
</html>
