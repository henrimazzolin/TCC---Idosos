<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Sequência Lógica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light theme (default) */
            --cor-fundo: #F8FAFC;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #1E293B;
            --cor-texto-claro: #64748B;
            --cor-primaria: #3B82F6;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-sucesso: #10B981;
            --cor-erro: #EF4444;
            --sombra: 0 4px 20px rgba(0, 0, 0, 0.08);
            --sombra-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --borda-radius: 16px;
            --border: #E2E8F0;
            --primary-light: rgba(59, 130, 246, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #0B6477, #0AD1C8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .page-title h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 8px;
        }

        .page-title p {
            font-size: 16px;
            color: var(--cor-texto-claro);
        }

        .game-container {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 30px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--cor-fundo);
            padding: 10px 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--cor-texto-claro);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .instructions {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            padding: 14px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .instructions p {
            font-size: 15px;
            font-weight: 600;
            color: #92400E;
        }

        .sequence-display {
            background: var(--cor-fundo);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        .sequence-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--cor-texto-claro);
            margin-bottom: 15px;
        }

        .sequence-items {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .seq-item {
            width: 55px;
            height: 55px;
            background: var(--cor-primaria);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
        }

        .seq-item.question {
            background: var(--cor-terceira);
            color: white;
        }

        .seq-item.space {
            background: transparent;
            border: 2px dashed #CBD5E1;
            color: #94A3B8;
            font-size: 20px;
        }

        .options-container {
            margin-bottom: 20px;
        }

        .options-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--cor-texto-claro);
            text-align: center;
            margin-bottom: 12px;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .option-btn {
            width: 70px;
            height: 70px;
            background: var(--cor-fundo);
            border: 3px solid #CBD5E1;
            border-radius: 14px;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--cor-primaria);
            background: #DBEAFE;
            transform: scale(1.05);
        }

        .option-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .option-btn.correct {
            background: var(--cor-secundaria);
            border-color: var(--cor-secundaria);
            color: white;
        }

        .option-btn.wrong {
            background: var(--cor-erro);
            border-color: var(--cor-erro);
            color: white;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback-message {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            min-height: 30px;
            margin-bottom: 15px;
        }

        .feedback-message.success {
            color: var(--cor-secundaria);
        }

        .feedback-message.error {
            color: var(--cor-erro);
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1D4ED8;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: var(--cor-terceira);
        }

        .btn-secondary:hover {
            background: #D97706;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .seq-item {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .option-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .page-title h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Sequência Lógica</h1>
            <p>Complete a sequência com o número correto</p>
        </div>

        <div class="game-container">
            <div class="stats-bar">
                <div class="stat-box">
                    <div class="stat-label">Acertos</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Rodada</div>
                    <div class="stat-value" id="round">1</div>
                </div>
            </div>

            <div class="instructions">
                <p>Qual número completa a sequência?</p>
            </div>

            <div class="sequence-display">
                <div class="sequence-items" id="sequence"></div>
            </div>

            <div class="options-container">
                <div class="options-label">Escolha a resposta:</div>
                <div class="options" id="options"></div>
            </div>

            <div class="feedback-message" id="feedback"></div>

            <div class="buttons">
                <button class="btn" id="nextBtn" onclick="nextSequence()" style="display: none;">Próxima Sequência</button>
                <button class="btn btn-secondary" onclick="resetGame()">Reiniciar Jogo</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        const sequences = [
            {
                sequence: [1, 2, 3],
                answer: 4,
                options: [4, 5, 6],
                hint: "Sequência de 1 em 1"
            },
            {
                sequence: [2, 4, 6],
                answer: 8,
                options: [7, 8, 9],
                hint: "Sequência de 2 em 2"
            },
            {
                sequence: [5, 10, 15],
                answer: 20,
                options: [18, 20, 25],
                hint: "Sequência de 5 em 5"
            },
            {
                sequence: [10, 20, 30],
                answer: 40,
                options: [35, 40, 45],
                hint: "Sequência de 10 em 10"
            },
            {
                sequence: [3, 6, 9],
                answer: 12,
                options: [10, 11, 12],
                hint: "Sequência de 3 em 3"
            },
            {
                sequence: [1, 1, 2, 2],
                answer: 3,
                options: [2, 3, 4],
                hint: "Pares iguais"
            },
            {
                sequence: [5, 6, 8, 9],
                answer: 11,
                options: [10, 11, 12],
                hint: "Pula um, depois dois"
            },
            {
                sequence: [2, 3, 5, 8],
                answer: 13,
                options: [11, 12, 13],
                hint: "Some os dois anteriores"
            },
            {
                sequence: [1, 4, 9, 16],
                answer: 25,
                options: [20, 25, 30],
                hint: "Números ao quadrado"
            },
            {
                sequence: [10, 9, 8, 7],
                answer: 6,
                options: [5, 6, 4],
                hint: "Sequência decrescente"
            }
        ];

        let currentSequence = null;
        let currentSequenceIndex = -1;
        let score = 0;
        let round = 1;
        let lastSequenceIndex = -1;
        let canAnswer = true;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function selectRandomSequence() {
            let available = sequences.filter((_, index) => index !== lastSequenceIndex);
            if (available.length === 0) {
                available = sequences;
            }
            const randomIndex = Math.floor(Math.random() * available.length);
            currentSequenceIndex = sequences.indexOf(available[randomIndex]);
            currentSequence = sequences[currentSequenceIndex];
            lastSequenceIndex = currentSequenceIndex;
        }

        function renderSequence() {
            const seqEl = document.getElementById('sequence');
            seqEl.innerHTML = '';

            currentSequence.sequence.forEach(num => {
                const item = document.createElement('div');
                item.className = 'seq-item';
                item.textContent = num;
                seqEl.appendChild(item);
            });

            const questionMark = document.createElement('div');
            questionMark.className = 'seq-item question';
            questionMark.textContent = '?';
            seqEl.appendChild(questionMark);

            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';

            const shuffledOptions = shuffleArray(currentSequence.options);

            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsEl.appendChild(btn);
            });

            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback-message';
            document.getElementById('nextBtn').style.display = 'none';
            canAnswer = true;
        }

        function checkAnswer(selected, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            const feedbackEl = document.getElementById('feedback');

            if (selected === currentSequence.answer) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score').textContent = score;
                feedbackEl.textContent = 'Muito bem! Acertou!';
                feedbackEl.className = 'feedback-message success';
            } else {
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if (parseInt(b.textContent) === currentSequence.answer) {
                        b.classList.add('correct');
                    }
                });
                feedbackEl.textContent = 'Quase! A resposta era ' + currentSequence.answer;
                feedbackEl.className = 'feedback-message error';
            }

            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function nextSequence() {
            round++;
            document.getElementById('round').textContent = round;
            selectRandomSequence();
            renderSequence();
        }

        function resetGame() {
            score = 0;
            round = 1;
            lastSequenceIndex = -1;
            document.getElementById('score').textContent = '0';
            document.getElementById('round').textContent = '1';
            selectRandomSequence();
            renderSequence();
        }

        selectRandomSequence();
        renderSequence();
    </script>
</body>
</html>
