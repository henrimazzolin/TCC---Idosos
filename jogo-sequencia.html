<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogo de sequência lógica para idosos - Mente Ativa">
    <title>Mente Ativa - Sequência Lógica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/jogo-sequencia.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Sequência Lógica</h1>
            <p>Complete a sequência com o número correto</p>
        </div>

        <div class="game-container">
            <div class="stats-bar">
                <div class="stat-box">
                    <div class="stat-label">Acertos</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Rodada</div>
                    <div class="stat-value" id="round">1</div>
                </div>
            </div>

            <div class="instructions">
                <p>Qual número completa a sequência?</p>
            </div>

            <div class="sequence-display">
                <div class="sequence-items" id="sequence"></div>
            </div>

            <div class="options-container">
                <div class="options-label">Escolha a resposta:</div>
                <div class="options" id="options"></div>
            </div>

            <div class="feedback-message" id="feedback"></div>

            <div class="buttons">
                <button class="btn" id="nextBtn" style="display: none;">Próxima Sequência</button>
                <button class="btn btn-secondary" id="btn-reset">Reiniciar Jogo</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script src="js/jogo-sequencia.js"></script>
</body>
</html>
