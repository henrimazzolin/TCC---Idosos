<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogo de repetição de palavras para idosos - Mente Ativa">
    <title>Mente Ativa - Repetição de Palavras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/jogo-repeticao.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-simples.html" class="back-btn">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Repetição de Palavras</h1>
            <p>Lembre das palavras</p>
        </div>

        <div class="instrucao">
            <p>Como jogar: Leia a palavra e clique em "Próxima" para ver a próxima!</p>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">Palavra Atual</div>
                <div class="info-value" id="currentWord">1/5</div>
            </div>
        </div>

        <div class="game-area">
            <div class="word-display">
                <div class="word-box">
                    <p class="word-text" id="wordText">Clique em Começar</p>
                </div>
                <p class="question" id="question">Prepare-se para lembrar!</p>
            </div>

            <div class="buttons-area">
                <button class="btn secondary" id="startBtn">Começar</button>
                <button class="btn" id="nextBtn" style="display: none;">Próxima</button>
                <button class="btn" id="finishBtn" style="display: none;">Ver Resultado</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="feedback" id="feedback">
        <div class="feedback-icon" id="feedbackIcon"></div>
        <h2 id="feedbackTitle">Parabéns!</h2>
        <p id="feedbackText">Você viu todas as palavras!</p>
        <button class="btn" id="feedbackBtn">Jogar Novamente</button>
    </div>

    <footer><p>Feito com cuidado para você</p></footer>

    <script src="js/jogo-repeticao.js"></script>
</body>
</html>
