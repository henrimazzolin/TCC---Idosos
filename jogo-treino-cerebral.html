<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Teste de Reação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light theme (default) */
            --cor-fundo: #F8FAFC;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #1E293B;
            --cor-texto-claro: #64748B;
            --cor-primaria: #3B82F6;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-sucesso: #10B981;
            --cor-erro: #EF4444;
            --sombra: 0 4px 20px rgba(0, 0, 0, 0.08);
            --sombra-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --borda-radius: 16px;
            --border: #E2E8F0;
            --primary-light: rgba(59, 130, 246, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #0B6477, #0AD1C8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--cor-texto);
            text-align: center;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--cor-texto-claro);
            text-align: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 18px 48px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--sombra);
        }

        .btn:hover {
            background: #1D4ED8;
            transform: scale(1.05);
            box-shadow: var(--sombra-hover);
        }

        .btn-secondary {
            background: var(--cor-terceira);
        }

        .btn-secondary:hover {
            background: #D97706;
        }

        .btn-green {
            background: var(--cor-secundaria);
            font-size: 28px;
            padding: 30px 60px;
            min-width: 300px;
        }

        .btn-green:hover {
            background: #059669;
        }

        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .game-screen.active {
            display: flex;
        }

        .message {
            font-size: 32px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 30px;
            text-align: center;
        }

        .message.prepare {
            color: var(--cor-terceira);
        }

        .message.success {
            color: var(--cor-secundaria);
        }

        .message .time {
            font-size: 48px;
            color: var(--cor-primaria);
            display: block;
            margin: 20px 0;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-box {
            background: var(--cor-fundo-card);
            padding: 16px 28px;
            border-radius: 14px;
            box-shadow: var(--sombra);
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .instructions {
            background: #E6FFFA;
            border-left: 4px solid #0AD1C8;
            padding: 16px 24px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 24px;
            max-width: 500px;
        }

        .instructions p {
            font-size: 16px;
            font-weight: 600;
            color: #92400E;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .title {
                font-size: 22px;
            }
            
            .message {
                font-size: 24px;
            }
            
            .message .time {
                font-size: 36px;
            }
            
            .btn {
                padding: 14px 32px;
                font-size: 18px;
            }
            
            .btn-green {
                font-size: 22px;
                padding: 24px 40px;
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="grupo-moderado.html" class="back-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </a>
        <div class="logo">
            <div class="logo-icon">
                <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
            </div>
            <span class="logo-text">Mente Ativa</span>
        </div>
    </div>

    <div class="game-area">
        <div class="game-screen active" id="startScreen">
            <h1 class="title">Teste de Reação</h1>
            <p class="subtitle">Treine sua velocidade de reação</p>
            
            <div class="instructions">
                <p>Como jogar: Clique em "Iniciar", espere aparecer o botão verde e clique o mais rápido que puder!</p>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Melhor Tempo</div>
                    <div class="stat-value" id="bestTime">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Tentativas</div>
                    <div class="stat-value" id="attempts">0</div>
                </div>
            </div>

            <button class="btn" onclick="startGame()">Iniciar</button>
        </div>

        <div class="game-screen" id="prepareScreen">
            <p class="message prepare">Prepare-se...</p>
            <p class="subtitle">Aguarde o botão verde aparecer</p>
        </div>

        <div class="game-screen" id="clickScreen">
            <button class="btn btn-green" id="clickBtn" onclick="handleClick()">CLIQUE AGORA!</button>
        </div>

        <div class="game-screen" id="resultScreen">
            <p class="message" id="resultMessage"></p>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Seu Tempo</div>
                    <div class="stat-value" id="currentTime">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Melhor Tempo</div>
                    <div class="stat-value" id="bestTimeResult">--</div>
                </div>
            </div>

            <button class="btn" onclick="startGame()">Tentar Novamente</button>
            <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 12px;">Voltar ao Menu</button>
        </div>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        let startTime = 0;
        let timeoutId = null;
        let canClick = false;
        let gameStarted = false;
        let attempts = 0;
        let bestTime = null;

        function showScreen(screenId) {
            document.querySelectorAll('.game-screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            attempts++;
            document.getElementById('attempts').textContent = attempts;
            
            gameStarted = true;
            canClick = false;
            
            showScreen('prepareScreen');
            
            const delay = Math.random() * 3000 + 2000;
            
            timeoutId = setTimeout(() => {
                if (gameStarted) {
                    showClickScreen();
                }
            }, delay);
        }

        function showClickScreen() {
            showScreen('clickScreen');
            canClick = true;
            startTime = Date.now();
        }

        function handleClick() {
            if (!gameStarted) return;

            if (!canClick) {
                clearTimeout(timeoutId);
                gameStarted = false;
                showTooEarly();
                return;
            }

            const reactionTime = Date.now() - startTime;
            canClick = false;
            gameStarted = false;

            showResult(reactionTime);
        }

        function showTooEarly() {
            const messageEl = document.getElementById('resultMessage');
            messageEl.innerHTML = 'Muito cedo!<br><span class="subtitle">Aguarde o botão verde aparecer</span>';
            messageEl.className = 'message prepare';
            
            document.getElementById('currentTime').textContent = '--';
            
            showScreen('resultScreen');
        }

        function showResult(time) {
            const messageEl = document.getElementById('resultMessage');
            
            if (bestTime === null || time < bestTime) {
                bestTime = time;
                document.getElementById('bestTime').textContent = bestTime + ' ms';
            }
            
            document.getElementById('currentTime').textContent = time + ' ms';
            document.getElementById('bestTimeResult').textContent = bestTime + ' ms';
            
            let rating = '';
            if (time < 200) {
                rating = 'Incrível!';
            } else if (time < 300) {
                rating = 'Muito rápido!';
            } else if (time < 400) {
                rating = 'Bom tempo!';
            } else if (time < 500) {
                rating = 'Pode melhorar!';
            } else {
                rating = 'Continue praticando!';
            }
            
            messageEl.innerHTML = `<span class="success">${rating}</span><span class="time">${time} ms</span>`;
            messageEl.className = 'message success';
            
            showScreen('resultScreen');
        }

        function goBack() {
            gameStarted = false;
            canClick = false;
            clearTimeout(timeoutId);
            showScreen('startScreen');
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                if (document.getElementById('clickScreen').classList.contains('active')) {
                    handleClick();
                } else if (document.getElementById('startScreen').classList.contains('active')) {
                    startGame();
                } else if (document.getElementById('resultScreen').classList.contains('active')) {
                    startGame();
                }
            }
        });
    </script>
</body>
</html>
