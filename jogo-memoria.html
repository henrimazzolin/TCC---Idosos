<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Jogo da Memória</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --sombra-hover: 0 8px 30px rgba(37, 99, 235, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
            box-shadow: var(--sombra-hover);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 8px;
        }

        .page-title p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .info-item {
            background: var(--cor-fundo-card);
            padding: 12px 24px;
            border-radius: 14px;
            box-shadow: var(--sombra);
            text-align: center;
        }

        .info-label {
            font-size: 14px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .card {
            aspect-ratio: 1;
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: scale(1.05);
            box-shadow: var(--sombra-hover);
        }

        .card.flipped {
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
        }

        .card.matched {
            background: var(--cor-secundaria);
            cursor: default;
        }

        .card-icon {
            width: 50%;
            height: 50%;
            fill: var(--cor-primaria);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card.flipped .card-icon,
        .card.matched .card-icon {
            opacity: 1;
            fill: white;
        }

        .card.matched .card-icon {
            fill: white;
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--cor-fundo-card);
            padding: 40px 60px;
            border-radius: var(--borda-radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .feedback.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .feedback-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback-icon.success {
            background: rgba(16, 185, 129, 0.2);
        }

        .feedback-icon.success svg {
            fill: #10B981;
            width: 50px;
            height: 50px;
        }

        .feedback-icon.error {
            background: rgba(239, 68, 68, 0.2);
        }

        .feedback-icon.error svg {
            fill: #EF4444;
            width: 50px;
            height: 50px;
        }

        .feedback h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 10px;
        }

        .feedback p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .btn {
            padding: 14px 36px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            background: #1D4ED8;
            transform: scale(1.05);
        }

        

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .logo {
                width: 100%;
                justify-content: center;
                margin-top: 12px;
            }
            
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            
            .game-info {
                gap: 15px;
            }
            
            .info-item {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <span class="logo-text">MindCare</span>
            </div>
        </div>

        <div class="page-title">
            <h1>Jogo da Memória</h1>
            <p>Encontre os pares de cartas iguais</p>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">Pares encontrados</div>
                <div class="info-value" id="pairs">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Tentativas</div>
                <div class="info-value" id="attempts">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="feedback" id="feedback">
        <div class="feedback-icon" id="feedbackIcon"></div>
        <h2 id="feedbackTitle">Muito bem!</h2>
        <p id="feedbackText">Você encontrou um par!</p>
        <button class="btn" id="feedbackBtn">Continuar</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        const icons = [
            '<svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11L12 2zm0 3.84L13.93 9h-3.87L12 5.84zM17.5 13c-2.49 0-4.5 2.01-4.5 4.5s2.01 4.5 4.5 4.5 4.5-2.01 4.5-4.5-2.01-4.5-4.5-4.5zm0 7c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5zM3 21.5h8v-2H3v2zm0-4h8v-2H3v2z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M11.5 22C11.64 22 11.77 22 11.9 22.01L12 22c.01-.05.02-.09.04-.14.07-.16.14-.32.24-.47.05-.08.11-.17.18-.25.15-.18.32-.34.51-.49.06-.05.13-.1.2-.14.2-.11.41-.19.64-.25.1-.02.2-.05.3-.06.24-.03.48-.03.71-.01.1.01.2.02.3.05.02 0 .03.01.05.01l-.01-.01c.23.05.45.12.66.23.08.04.16.1.23.15.15.11.29.24.41.38.05.06.1.13.14.2.09.15.16.31.22.47 0 .02.01.03.01.05l-.01-.01c.05.15.08.31.1.47.01.07.01.13.01.2 0 .03-.01.06-.01.1l-.01-.01c0 .03 0 .06-.01.09z"/></svg>'
        ];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let attempts = 0;
        let isLocked = false;

        function initGame() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            cards = [...icons, ...icons];
            cards = cards.sort(() => Math.random() - 0.5);
            
            flippedCards = [];
            matchedPairs = 0;
            attempts = 0;
            isLocked = false;
            
            document.getElementById('pairs').textContent = '0';
            document.getElementById('attempts').textContent = '0';
            
            cards.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.innerHTML = `<div class="card-icon">${icon}</div>`;
                card.addEventListener('click', () => flipCard(card, index));
                board.appendChild(card);
            });
        }

        function flipCard(card, index) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }
            
            card.classList.add('flipped');
            flippedCards.push({ card, index, icon: cards[index] });
            
            if (flippedCards.length === 2) {
                attempts++;
                document.getElementById('attempts').textContent = attempts;
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const [first, second] = flippedCards;
            
            if (first.icon === second.icon) {
                setTimeout(() => {
                    first.card.classList.add('matched');
                    second.card.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('pairs').textContent = matchedPairs;
                    
                    showFeedback(true, 'Muito bem!', 'Você encontrou um par!');
                }, 300);
            } else {
                setTimeout(() => {
                    first.card.classList.remove('flipped');
                    second.card.classList.remove('flipped');
                    showFeedback(false, 'Quase lá!', 'Tente encontrar outro par');
                }, 600);
            }
        }

        function showFeedback(success, title, text) {
            const overlay = document.getElementById('overlay');
            const feedback = document.getElementById('feedback');
            const feedbackIcon = document.getElementById('feedbackIcon');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');
            const feedbackBtn = document.getElementById('feedbackBtn');
            
            feedbackIcon.className = 'feedback-icon ' + (success ? 'success' : 'error');
            feedbackIcon.innerHTML = success 
                ? '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
            
            feedbackTitle.textContent = title;
            feedbackText.textContent = text;
            
            if (matchedPairs === 8) {
                feedbackTitle.textContent = 'Parabéns!';
                feedbackText.textContent = 'Você encontrou todos os pares!';
                feedbackBtn.textContent = 'Jogar Novamente';
                feedbackBtn.onclick = () => {
                    hideFeedback();
                    initGame();
                };
            } else {
                feedbackBtn.textContent = 'Continuar';
                feedbackBtn.onclick = () => {
                    hideFeedback();
                    flippedCards = [];
                    isLocked = false;
                };
            }
            
            overlay.classList.add('show');
            feedback.classList.add('show');
        }

        function hideFeedback() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('feedback').classList.remove('show');
        }

        document.getElementById('overlay').addEventListener('click', hideFeedback);

        initGame();
    </script>
</body>
</html>
