<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calendário de atividades - Mente Ativa">
    <title>Mente Ativa - Calendário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/acessibilidade.js" defer></script>
    <script src="js/calendario.js" defer></script>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/calendario.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="menu.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <div class="titulo-com-tts">
                <h1>Calendário</h1>
                <button id="btn-tts-calendario" class="tts-btn" aria-label="Ouvir texto">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
            </div>
            <p>Março 2026</p>
        </div>

        <div class="calendar">
            <div class="calendar-header">
                <h2>Março 2026</h2>
                <div class="month-nav">
                    <button id="btn-mes-anterior">
                        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <button id="btn-proximo-mes">
                        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </div>

            <div class="weekdays">
                <span>Dom</span>
                <span>Seg</span>
                <span>Ter</span>
                <span>Qua</span>
                <span>Qui</span>
                <span>Sex</span>
                <span>Sáb</span>
            </div>

            <div class="days">
            </div>
        </div>

        <div class="event-types">
            <div class="event-type">
                <span class="dot medic"></span>
                <span>Remédio</span>
            </div>
            <div class="event-type">
                <span class="dot medical"></span>
                <span>Consulta</span>
            </div>
            <div class="event-type">
                <span class="dot activity"></span>
                <span>Atividade</span>
            </div>
        </div>

        <div class="events-list">
        </div>

        <button id="btn-adicionar-evento" class="add-event-btn">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Adicionar Evento
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Novo Evento</h2>
            <div class="form-group">
                <label for="eventTitle">Nome do Evento</label>
                <input type="text" id="eventTitle" placeholder="Ex: Tomar remédio">
            </div>
            <div class="form-group">
                <label for="eventType">Tipo de Evento</label>
                <select id="eventType">
                    <option value="medic">Remédio</option>
                    <option value="medical">Consulta</option>
                    <option value="activity">Atividade</option>
                </select>
            </div>
            <div class="form-group">
                <label for="eventTime">Horário</label>
                <input type="time" id="eventTime" value="09:00">
            </div>
            <div class="form-group">
                <label for="eventPeriod">Descrição</label>
                <input type="text" id="eventPeriod" placeholder="Ex: Manhã, Parque, Dr. João">
            </div>
            <div class="modal-buttons">
                <button id="btn-cancelar-evento" class="modal-btn cancel">Cancelar</button>
                <button id="btn-salvar-evento" class="modal-btn save">Salvar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="modal">
            <h2>Remover Atividade</h2>
            <div class="delete-confirm-content">
                <p class="delete-confirm-text">Tem certeza que deseja remover esta atividade?</p>
                <div class="delete-event-info">
                    <strong id="deleteEventTitle"></strong>
                    <span id="deleteEventTime"></span>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="btn-cancelar-exclusao" class="modal-btn cancel">Cancelar</button>
                <button id="btn-confirmar-exclusao" class="modal-btn delete">Sim, Remover</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>
</body>
</html>
