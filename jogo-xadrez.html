<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Xadrez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @charset "utf-8";

        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-title p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .game-area {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid var(--cor-primaria);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .game-area.active {
            opacity: 1;
            visibility: visible;
        }

        /* ===== XADREZ STYLES ===== */
        .borda { border: #F00; }
        .tabPreto { background: #03C; }

        /* TABULEIRO */
        #tabuleiro {
            width: 576px;
            height: 576px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 0;
            border: #333 solid 3px;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            background: #333;
            overflow: hidden;
        }

        #tabuleiro div {
            width: 72px;
            height: 72px;
            font-size: 48px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        #tabuleiro div:hover {
            filter: brightness(0.95);
        }

        #t11, #t13, #t15, #t17, #t22, #t24, #t26, #t28, #t31, #t33, #t35, #t37, #t42, #t44, #t46, #t48, #t51, #t53, #t55, #t57, #t62, #t64, #t66, #t68, #t71, #t73, #t75, #t77, #t82, #t84, #t86, #t88 {
            background-color: #F0D9B5;
        }

        #t12, #t14, #t16, #t18, #t21, #t23, #t25, #t27, #t32, #t34, #t36, #t38, #t41, #t43, #t45, #t47, #t52, #t54, #t56, #t58, #t61, #t63, #t65, #t67, #t72, #t74, #t76, #t78, #t81, #t83, #t85, #t87 {
            background-color: #B58863;
        }

        #fundo {
            background: #000;
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 999;
            top: 0;
            left: 0;
            opacity: 0.50;
            -moz-opacity: 0.50;
            filter: alpha(opacity=50);
            display: none;
        }

        .escolhe {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 1000;
            background: var(--cor-fundo-card);
            border: var(--cor-primaria) solid 3px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 90%;
            width: auto;
        }

        #escolhecor-inicio.escolhe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            background: var(--cor-fundo);
            transform: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #escolhecor-inicio.escolhe:not(.hidden) {
            opacity: 1;
        }

        #escolhecor-inicio.hidden {
            display: none;
        }

        .back-btn-escolha {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 2010;
        }

        .back-btn-escolha:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .back-btn-escolha svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }


        .color-choice-container {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .escolha-lado-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .escolha-lado-titulo {
            font-size: 32px;
            font-weight: 700;
            color: var(--cor-primaria);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .color-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-piece {
            width: 140px;
            height: 140px;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-option:hover .color-piece {
            transform: scale(1.15);
            filter: drop-shadow(0 4px 15px rgba(37, 99, 235, 0.4));
        }

        .color-label {
            font-size: 36px;
            font-weight: 900;
            color: var(--cor-primaria);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            min-width: 160px;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
            margin-top: 40px;
        }

        #game-header {
            transition: all 0.3s ease;
            opacity: 1;
            visibility: visible;
        }

        #game-header.hidden {
            opacity: 0;
            visibility: hidden;
            display: none;
        }

        #game-status {
            padding: 15px 30px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(16, 185, 129, 0.1));
            border-radius: 12px;
            border-left: 5px solid var(--cor-primaria);
        }

        #status-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-you {
            color: var(--cor-primaria);
        }

        .status-robo {
            color: #FF6B6B;
        }

        /* TELA DE FIM DE JOGO */
        #game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #game-over-modal.active {
            display: flex;
        }

        .game-over-content {
            background: var(--cor-fundo-card);
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .game-over-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-over-title.won {
            color: var(--cor-secundaria);
        }

        .game-over-title.lost {
            color: #FF6B6B;
        }

        .game-over-message {
            font-size: 18px;
            color: var(--cor-texto-claro);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .game-over-btn {
            padding: 15px 40px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .game-over-btn:hover {
            background: #1D4ED8;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        @media (max-width: 768px) {
            .page-title h1 {
                font-size: 24px;
            }

            .game-area {
                padding: 15px;
            }

            #tabuleiro {
                width: 100%;
                height: auto;
                max-width: 450px;
                aspect-ratio: 1;
                margin: 20px auto;
            }

            #tabuleiro div {
                width: auto;
                height: auto;
                font-size: 36px;
            }

            .escolhe {
                width: 90%;
                max-width: 350px;
            }
        }

        @media (max-width: 480px) {
            #tabuleiro {
                width: 100%;
                max-width: 320px;
                height: auto;
                aspect-ratio: 1;
            }

            #tabuleiro div {
                font-size: 24px;
            }

            .color-piece {
                width: 100px;
                height: 100px;
                font-size: 70px;
            }

            .color-label {
                font-size: 24px;
            }

            .color-choice-container {
                gap: 40px;
                align-self: center;
                justify-self: center;
            }

            .escolha-lado-container {
                gap: 25px;
                padding: 25px 20px;
                width: 90%;
            }

            .escolha-lado-titulo {
                font-size: 20px;
            }

            .page-title h1 {
                font-size: 20px;
            }

            .container {
                padding: 10px;
            }

            .game-over-title {
                font-size: 32px;
            }

            .game-over-emoji {
                font-size: 60px;
            }

            .game-over-btn {
                padding: 12px 30px;
                font-size: 14px;
            }

            .escolhe {
                padding: 20px;
                border-radius: 15px;
        }
    
        }
    </style>
</head>

            //cria array que var receber as posicoes do tabuleiro
            cria_array();
            function cria_array(){
                var x,y;

                peca = new Array();

                for(x=1;x<=8;x++){

                    peca[x] = new Array();

                    for(y=1;y<=8;y++){

                        peca[x][y] = new Array();
                        peca[x][y]['peca'] = false; 		//defino como falso para as que não começam com peça ficarem nulas
                        peca[x][y]['cor'] = false;			//defino como falso para as que não começam com peça ficarem nulas

                    }
                }


                il = new Array();
                il['preto'] = new Array();
                il['branco'] = new Array();

            }

        function possiveis_movimentos(){
            var x,y;
            var c =0; //contador pro array possiveis
            var i; //contador pros for
            x = movimenta['selecionada']['x'];
            y = movimenta['selecionada']['y'];

            document.getElementById('t'+x+y).style.backgroundColor = "#3C9"; //muda cor de fundo
            possiveis[c] = "t"+x+y; c++;

            ///////////////////////////////////////////////////////////////////////////////////PEAO////////////////////////////////
            if(peca[x][y]['peca']=='peao'){
                if(peca[x][y]['cor']=="branco"){

                    if(!peca[x-1][y]['peca']){
                        possivel(x-1,y);
                    }if(y-1>0 && peca[x-1][y-1]['peca']){
                        possivel(x-1,y-1);
                    }
                    if(y+1<9 && peca[x-1][y+1]['peca']){
                        possivel(x-1,y+1);
                    }

                    if(x==7){
                        if(!peca[x-2][y]['peca'] && !peca[x-1][y]['peca']){
                            possivel(x-2,y);
                        }
                    }

                }


                if(peca[x][y]['cor']=="preto"){

                    if(!peca[x+1][y]['peca']){
                        possivel(x+1,y);
                    }if(y-1>0 && peca[x+1][y-1]['peca']){
                        possivel(x+1,y-1);
                    }
                    if(y+1<9 && peca[x+1][y+1]['peca']){
                        possivel(x+1,y+1);
                    }

                    if(x==2){

                        if(!peca[x+2][y]['peca'] && !peca[x+1][y]['peca']){
                            possivel(x+2,y);
                        }

                    }

                }
            }
            ///////////////////////////////////////////////////////////////////////////////////////FIM PEAO//////////////////////////////

            //////////////////////////////////////////////////////////////////////////////////////CAVALO ////////////////////////////////

            if(peca[x][y]['peca']=='cavalo'){

                possivel(x-1,y-2);
                possivel(x+1,y+2);
                possivel(x+1,y-2);
                possivel(x-1,y+2);
                possivel(x-2,y-1);
                possivel(x+2,y+1);
                possivel(x+2,y-1);
                possivel(x-2,y+1);

            }
            //////////////////////////////////////////////////////////////////////////////////////FIM CAVALO ////////////////////////////

            //////////////////////////////////////////////////////////////////////////////////////REI ///////////////////////////////////
            if(peca[x][y]['peca']=='rei'){
                possivel(x-1,y);
                possivel(x,y-1);
                possivel(x-1,y-1);
                possivel(x+1,y);
                possivel(x,y+1);
                possivel(x+1,y+1);
                possivel(x-1,y+1);
                possivel(x+1,y-1);
            }
            //////////////////////////////////////////////////////////////////////////////////////FIM REI ////////////////////////////


            //////////////////////////////////////////////////////////////////////////////////////TORRE ///////////////////////////////////
            if(peca[x][y]['peca']=='torre'){

                for(i=1;possivel(x-i,y);i++);
                for(i=1;possivel(x+i,y);i++);
                for(i=1;possivel(x,y-i);i++);
                for(i=1;possivel(x,y+i);i++);
            }
            //////////////////////////////////////////////////////////////////////////////////////FIM TORRE ////////////////////////////

            //////////////////////////////////////////////////////////////////////////////////////BISPO ///////////////////////////////////
            if(peca[x][y]['peca']=='bispo'){

                for(i=1;possivel(x-i,y-i);i++);
                for(i=1;possivel(x+i,y+i);i++);
                for(i=1;possivel(x-i,y+i);i++);
                for(i=1;possivel(x+i,y-i);i++);
            }
            //////////////////////////////////////////////////////////////////////////////////////FIM BISPO ////////////////////////////

            //////////////////////////////////////////////////////////////////////////////////////RAINHA ///////////////////////////////////
            if(peca[x][y]['peca']=='rainha'){

                for(i=1;possivel(x-i,y-i);i++);
                for(i=1;possivel(x+i,y+i);i++);
                for(i=1;possivel(x-i,y+i);i++);
                for(i=1;possivel(x+i,y-i);i++);
                for(i=1;possivel(x-i,y);i++);
                for(i=1;possivel(x+i,y);i++);
                for(i=1;possivel(x,y-i);i++);
                for(i=1;possivel(x,y+i);i++);

            }
            //////////////////////////////////////////////////////////////////////////////////////FIM RAINHA ////////////////////////////



            function possivel(px,py){
                if(px>0 && px <9 && py>0 && py <9 && peca[px][py]['cor']!= movimenta['selecionada']['cor']){
                    document.getElementById('t'+(px)+(py)).style.backgroundColor = "#3C9"; //muda cor de fundo
                    possiveis[c] = "t"+(px)+(py); c++;

                    if(!peca[px][py]['peca']){
                        return true;
                    }
                }else{
                    return false;
                }


            }

            return c;
        }

        function volta_fundo(){
            var cf;
            for(cf=0;cf<possiveis.length;cf++){
                document.getElementById(possiveis[cf]).style.backgroundColor = "";
            }
        }

        function verifica_possivel(x,y,c){
            var pode=0;
            var cp;
            var div = "t"+x+y;

            for(cp=1;cp<c;cp++){

                if(possiveis[cp]==div){
                    pode ++;
                }
                if(pode>0){
                    return 1;
                }
            }

        }

        function seleciona(x,y){


            if((movimenta['selecionada']['x']==0 || peca[x][y]['cor'] == movimenta['selecionada']['cor']) && peca[x][y]['cor']==vez){
                if(movimenta['selecionada']['x']!=0){
                    volta_fundo(); //volta a cor de fundo normal
                }
                if(peca[x][y]['peca']){ //se tiver uma peca nessa posição
                    movimenta['selecionada']['x'] = x;	//recebe x selecionado
                    movimenta['selecionada']['y'] = y;  //recebe y selecionado
                    movimenta['selecionada']['peca'] = peca[x][y]['peca']; //recebe a peca selecionada
                    movimenta['selecionada']['cor'] = peca[x][y]['cor'];	//recebe a cor selecionada

                    cont_possiveis = possiveis_movimentos();
                }

            }else if(verifica_possivel(x,y,cont_possiveis)){ //se for segundo clique e a cor da peca destino for diferente da selecionada

                if(peca[x][y]['peca']=="rei"){
                    // Mostrar tela de fim de jogo
                    mostrarFimDeJogo(movimenta['selecionada']['cor']);
                    return;
                }

                if(peca[x][y]['cor'] != movimenta['selecionada']['cor']){
                    movimenta['destino']['x'] =x;	//recebe o x do destino(segundo clique)
                    movimenta['destino']['y'] =y;  //recebe y do destino(segundo clique)

                    if(peca[x][y]['peca']){  //se tiver alguma peca nessa posição
                        movimenta['destino']['peca'] = peca[x][y]['peca'];	//destino recebe a peca selecionada
                        movimenta['destino']['cor'] = peca[x][y]['cor'];	//destino recebe a cor selecionada
                    }


                    document.getElementById("t"+movimenta['selecionada']['x']+""+movimenta['selecionada']['y']).innerHTML = ""; //selcionada fica sem imagem
                    document.getElementById("t"+x+""+y).innerHTML = il[movimenta['selecionada']['cor']][movimenta['selecionada']['peca']]; //destino recebe a imagem da peça selecinada
                    peca[x][y]['peca']=movimenta['selecionada']['peca'];	//posicao destino recebe a peca
                    peca[x][y]['cor']=movimenta['selecionada']['cor'];		//posicao destino recebe a cor

                    peca[movimenta['selecionada']['x']][movimenta['selecionada']['y']]['peca'] = false;		//peca selecionada recebe 0
                    peca[movimenta['selecionada']['x']][movimenta['selecionada']['y']]['cor'] = false;		//cor selecionada recebe 0

                    movimenta['selecionada']['x'] =0;	//selecionada x recebe 0 (pra na proxima ver q é o primeiro movimento)
                    movimenta['selecionada']['y'] =0;	//selecionada y recebe 0 (pra na proxima ver q é o primeiro movimento)
                    movimenta['selecionada']['peca']="0";	//selecionada peca recebe 0 (pra na proxima ver q é o primeiro movimento)
                    movimenta['selecionada']['cor']="0";	//selecionada cor recebe 0 (pra na proxima ver q é o primeiro movimento)

                }

                volta_fundo(); //volta a cor de fundo normal

                if(vez=="branco"){vez="preto";}else{vez="branco";} //troca a vez
                
                if(playerColor) {
                    atualizarStatus(); //atualizar status do jogo
                }

            }




        }

        function escolhecor_incio(cor){
            document.getElementById('escolhecor-inicio').classList.add('hidden');
            document.getElementById('fundo').style.display = 'none';
            document.getElementById('game-status').style.display = 'block';

            robotColor = (cor === 'branco') ? 'preto' : 'branco';
            
            vez = cor;
            
            atualizarStatus();
        }

        function atualizarStatus() {
            const statusDiv = document.getElementById('status-text');
            let html = '';
            
            if (vez === playerColor) {
                html = '<span class="status-you">🔵 SUA VEZ (VOCÊ)</span>';
            } else {
                html = '<span class="status-robo">🤖 VEZ DO ROBÔ</span>';
            }
            
            // Verificar se alguém está em cheque
            if (estaEmCheque(playerColor)) {
                html += ' <span style="color: #FF6B6B; font-weight: 800; font-size: 14px; margin-left: 10px;">⚠️ SEU REI ESTÁ EM CHEQUE!</span>';
            } else if (estaEmCheque(robotColor)) {
                html += ' <span style="color: #FF6B6B; font-weight: 800; font-size: 14px; margin-left: 10px;">⚠️ REI DO ROBÔ EM CHEQUE!</span>';
            }
            
            statusDiv.innerHTML = html;
        }

        // Função para verificar se uma cor de rei está em cheque
        function estaEmCheque(cor) {
            // Encontrar a posição do rei
            let reiX = -1, reiY = -1;
            for (let x = 1; x <= 8; x++) {
                for (let y = 1; y <= 8; y++) {
                    if (peca[x][y]['peca'] === 'rei' && peca[x][y]['cor'] === cor) {
                        reiX = x;
                        reiY = y;
                        break;
                    }
                }
                if (reiX !== -1) break;
            }

            if (reiX === -1) return false;

            // Verificar se alguma peça inimiga pode atacar o rei
            const corInimiga = (cor === 'branco') ? 'preto' : 'branco';
            
            for (let x = 1; x <= 8; x++) {
                for (let y = 1; y <= 8; y++) {
                    if (peca[x][y]['peca'] && peca[x][y]['cor'] === corInimiga) {
                        // Temporariamente trocar turno para verificar movimentos inimigos
                        const vezAnterior = vez;
                        vez = corInimiga;
                        
                        // Salvar array de possiveis
                        const possivelAnterior = possiveis;
                        possiveis = [];
                        
                        // Verificar se esse inimigo pode atacar o rei
                        const podeAtacar = verificaAtaque(x, y, reiX, reiY);
                        
                        // Restaurar
                        possiveis = possivelAnterior;
                        vez = vezAnterior;
                        
                        if (podeAtacar) return true;
                    }
                }
            }
            return false;
        }

        // Função auxiliar para verificar se uma peça pode atacar uma posição
        function verificaAtaque(px, py, tx, ty) {
            const tipo = peca[px][py]['peca'];
            
            if (tipo === 'peao') {
                if (peca[px][py]['cor'] === 'branco') {
                    if (px - 1 === tx && (py - 1 === ty || py + 1 === ty)) return true;
                } else {
                    if (px + 1 === tx && (py - 1 === ty || py + 1 === ty)) return true;
                }
            }
            else if (tipo === 'cavalo') {
                const movsCavalo = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                for (const [dx, dy] of movsCavalo) {
                    if (px + dx === tx && py + dy === ty) return true;
                }
            }
            else if (tipo === 'rei') {
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        if (dx === 0 && dy === 0) continue;
                        if (px + dx === tx && py + dy === ty) return true;
                    }
                }
            }
            else if (tipo === 'torre' || tipo === 'rainha') {
                // Movimento em linha reta (torre e rainha)
                if (px === tx) {
                    const start = Math.min(py, ty) + 1;
                    const end = Math.max(py, ty);
                    let bloqueado = false;
                    for (let i = start; i < end; i++) {
                        if (peca[px][i]['peca']) { bloqueado = true; break; }
                    }
                    if (!bloqueado) return true;
                }
                if (py === ty) {
                    const start = Math.min(px, tx) + 1;
                    const end = Math.max(px, tx);
                    let bloqueado = false;
                    for (let i = start; i < end; i++) {
                        if (peca[i][py]['peca']) { bloqueado = true; break; }
                    }
                    if (!bloqueado) return true;
                }
            }
            
            if (tipo === 'bispo' || tipo === 'rainha') {
                // Movimento diagonal
                if (Math.abs(px - tx) === Math.abs(py - ty) && Math.abs(px - tx) > 0) {
                    const dx = tx > px ? 1 : -1;
                    const dy = ty > py ? 1 : -1;
                    let x = px + dx, y = py + dy;
                    let bloqueado = false;
                    while (x !== tx || y !== ty) {
                        if (peca[x][y]['peca']) { bloqueado = true; break; }
                        x += dx;
                        y += dy;
                    }
                    if (!bloqueado) return true;
                }
            }
            
            return false;
        }

        // Função para mostrar tela de fim de jogo
        function mostrarFimDeJogo(vencedorCor) {
            if (gameEnded) return;
            gameEnded = true;
            
            const modal = document.getElementById('game-over-modal');
            const emoji = document.getElementById('game-over-emoji');
            const title = document.getElementById('game-over-title');

            if (vencedorCor === playerColor) {

                emoji.textContent = '🏆';

                message.textContent = 'Parabéns! Você conseguiu uma vitória impressionante no xadrez!';
            } else {
                // Você perdeu
                emoji.textContent = '😔';
                title.textContent = 'Você Perdeu!';
                title.className = 'game-over-title lost';
                message.textContent = 'O robô foi mais estratégico desta vez. Tente novamente!';
            }
            
            modal.classList.add('active');
            document.getElementById('fundo').style.display = 'block';
        }
