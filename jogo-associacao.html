<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Associação de Palavras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/acessibilidade.js" defer></script>
    <style>
        :root {
            --cor-primaria: #2563EB;
            --cor-secundaria: #10B981;
            --cor-terceira: #F59E0B;
            --cor-erro: #EF4444;
            --cor-fundo: #F0F9FF;
            --cor-fundo-card: #FFFFFF;
            --cor-texto: #000000;
            --cor-texto-claro: #1E293B;
            --sombra: 0 4px 20px rgba(37, 99, 235, 0.15);
            --sombra-hover: 0 8px 30px rgba(37, 99, 235, 0.25);
            --borda-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--cor-fundo-card);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-4px);
            box-shadow: var(--sombra-hover);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cor-texto);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 8px;
            display: inline;
        }

        .titulo-com-tts {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .page-title p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .tts-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--cor-primaria);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .tts-btn:hover {
            background: #1D4ED8;
            transform: scale(1.1);
        }

        .tts-btn svg {
            width: 28px;
            height: 28px;
        }

        .tts-btn.lendo {
            background: #10B981;
            animation: pulsando 1.5s ease-in-out infinite;
        }

        @keyframes pulsando {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .instrucao-destaque {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 24px;
            text-align: center;
        }

        .instrucao-destaque p {
            font-size: 20px;
            font-weight: 600;
            color: #92400E;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .info-item {
            background: var(--cor-fundo-card);
            padding: 12px 24px;
            border-radius: 14px;
            box-shadow: var(--sombra);
            text-align: center;
        }

        .info-label {
            font-size: 14px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cor-primaria);
        }

        .game-area {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 30px;
            
        }

        .word-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 6px;
        }

        .column-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--cor-texto);
            text-align: center;
            margin-bottom: 10px;
        }

        .word-card {
            background: var(--cor-fundo-card);
            border-radius: var(--borda-radius);
            box-shadow: var(--sombra);
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--cor-texto);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px;
        }

        .word-card:hover:not(.selected):not(.matched) {
            transform: scale(1.05);
            box-shadow: var(--sombra-hover);
        }

        .word-card.selected {
            border-color: var(--cor-primaria);
            background: rgba(37, 99, 235, 0.15);
            transform: scale(1.05);
        }

        .word-card.matched {
            border-color: var(--cor-secundaria);
            background: rgba(16, 185, 129, 0.2);
            cursor: default;
        }

        .word-card.wrong {
            border-color: var(--cor-erro);
            background: rgba(239, 68, 68, 0.2);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .connection-line {
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--cor-texto-claro);
        }

        .btn {
            padding: 14px 36px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .btn:hover {
            background: #1D4ED8;
            transform: scale(1.05);
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--cor-fundo-card);
            padding: 40px 60px;
            border-radius: var(--borda-radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .feedback.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .feedback-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 185, 129, 0.2);
        }

        .feedback-icon svg {
            fill: #10B981;
            width: 50px;
            height: 50px;
        }

        .feedback h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--cor-texto);
            margin-bottom: 10px;
        }

        .feedback p {
            font-size: 18px;
            color: var(--cor-texto-claro);
            font-weight: 500;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-claro);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .logo {
                width: 100%;
                justify-content: center;
                margin-top: 12px;
            }

            .game-area {
                flex-direction: column;
            }

            .connection-line {
                transform: rotate(90deg);
                margin: 10px 0;
            }

            .word-card {
                font-size: 18px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="grupo-moderado.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/unnamed.jpg" alt="Logo Mente Ativa" />
                </div>
                <span class="logo-text">Mente Ativa</span>
            </div>
        </div>

        <div class="page-title">
            <div class="titulo-com-tts">
                <h1>Associação de Palavras</h1>
                <button class="tts-btn" onclick="toggleLeitura('Associação de Palavras. Conecte as palavras que têm relação entre si.', this)" aria-label="Ouvir instruções">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
            </div>
            <p>Conecte as palavras que têm relação entre si</p>
        </div>

        <div class="instrucao-destaque">
            <p>Como jogar: Toque em uma palavra da esquerda e depois na palavra relacionada da direita!</p>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">Acertos</div>
                <div class="info-value" id="correct">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Pares</div>
                <div class="info-value" id="pairs">0/4</div>
            </div>
        </div>

        <div class="game-area">
            <div class="word-column">
                <div class="column-title">Palavras</div>
                <div id="leftWords"></div>
            </div>
            <div class="connection-line">↔</div>
            <div class="word-column">
                <div class="column-title">Associações</div>
                <div id="rightWords"></div>
            </div>
        </div>

        <button class="btn" id="restartBtn" onclick="restartGame()">Reiniciar Jogo</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="feedback" id="feedback">
        <div class="feedback-icon success">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h2>Parabéns!</h2>
        <p>Você completou todas as associações!</p>
        <button class="btn" onclick="restartGame()">Jogar Novamente</button>
    </div>

    <footer>
        <p>Feito com cuidado para você</p>
    </footer>

    <script>
        const wordPairs = [
            { left: 'Sol', right: 'Calor' },
            { left: 'Noite', right: 'Lua' },
            { left: 'Água', right: 'Sede' },
            { left: 'Pão', right: 'Fome' },
            { left: 'Cama', right: 'Sono' },
            { left: 'Chuva', right: 'Guarda-chuva' },
            { left: 'Dor', right: 'Médico' },
            { left: 'Escola', right: 'Professora' },
            { left: 'Natal', right: 'Presente' },
            { left: 'Fogo', right: 'Queimado' },
            { left: 'Cão', right: 'Latido' },
            { left: 'Gato', right: 'Miado' }
        ];

        let currentPairs = [];
        let selectedLeftCard = null;
        let selectedLeftWord = null;
        let matchedPairs = 0;
        let correctCount = 0;
        let isLocked = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initGame() {
            matchedPairs = 0;
            correctCount = 0;
            isLocked = false;
            selectedLeftCard = null;
            selectedLeftWord = null;
            
            document.getElementById('correct').textContent = '0';
            document.getElementById('pairs').textContent = '0/4';
            
            const leftContainer = document.getElementById('leftWords');
            const rightContainer = document.getElementById('rightWords');
            
            leftContainer.innerHTML = '';
            rightContainer.innerHTML = '';
            
            currentPairs = shuffleArray(wordPairs).slice(0, 4);
            
            const shuffledRight = shuffleArray([...currentPairs]);
            
            currentPairs.forEach((pair, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.textContent = pair.left;
                card.dataset.word = pair.left;
                card.dataset.pairIndex = index;
                card.addEventListener('click', () => selectLeftCard(card));
                leftContainer.appendChild(card);
            });
            
            shuffledRight.forEach((pair, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.textContent = pair.right;
                card.dataset.word = pair.right;
                card.dataset.pairIndex = currentPairs.findIndex(p => p.right === pair.right);
                card.addEventListener('click', () => selectRightCard(card));
                rightContainer.appendChild(card);
            });
        }

        function selectLeftCard(card) {
            if (isLocked) return;
            if (card.classList.contains('matched')) return;
            
            document.querySelectorAll('#leftWords .word-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedLeftCard = card;
            selectedLeftWord = card.dataset.word;
        }

        function selectRightCard(card) {
            if (isLocked) return;
            if (card.classList.contains('matched')) return;
            if (!selectedLeftCard) return;
            
            isLocked = true;
            
            const leftPairIndex = parseInt(selectedLeftCard.dataset.pairIndex);
            const rightPairIndex = parseInt(card.dataset.pairIndex);
            
            if (leftPairIndex === rightPairIndex) {
                correctCount++;
                matchedPairs++;
                document.getElementById('correct').textContent = correctCount;
                document.getElementById('pairs').textContent = matchedPairs + '/4';
                
                selectedLeftCard.classList.remove('selected');
                selectedLeftCard.classList.add('matched');
                card.classList.add('matched');
                
                selectedLeftCard = null;
                selectedLeftWord = null;
                isLocked = false;
                
                if (matchedPairs === 4) {
                    setTimeout(() => {
                        showWinMessage();
                    }, 500);
                }
            } else {
                card.classList.add('wrong');
                
                setTimeout(() => {
                    card.classList.remove('wrong');
                    if (selectedLeftCard) {
                        selectedLeftCard.classList.remove('selected');
                        selectedLeftCard = null;
                        selectedLeftWord = null;
                    }
                    isLocked = false;
                }, 800);
            }
        }

        function showWinMessage() {
            document.getElementById('overlay').classList.add('show');
            document.getElementById('feedback').classList.add('show');
        }

        function restartGame() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('feedback').classList.remove('show');
            initGame();
        }

        document.getElementById('overlay').addEventListener('click', restartGame);

        initGame();
    </script>
</body>
</html>
